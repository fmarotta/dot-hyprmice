# ============================================
#  Hyprlock — macOS Sequoia Light Theme
#  Drop into ~/.config/hypr/hyprlock.conf
# ============================================

general {
    # disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
}

# --- Background ---
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.02
    contrast = 1.0
    brightness = 0.9
    vibrancy = 0.1
    vibrancy_darkness = 0.0
}

# --- Clock (large time display) ---
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(29, 29, 31, 0.92)
    font_size = 72
    # font_family = SF Pro Display, Helvetica Neue, sans-serif
    position = 0, 180
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.08)
    shadow_boost = 1.0
}

# --- Date ---
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %-d")"
    color = rgba(29, 29, 31, 0.75)
    font_size = 18
    # font_family = SF Pro Text, Helvetica Neue, sans-serif
    position = 0, 100
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.06)
    shadow_boost = 1.0
}

# --- Password input box ---
input-field {
    monitor =
    size = 300, 44
    outline_thickness = 1
    # dots_size = 0.28
    # dots_spacing = 0.18
    dots_center = true
    dots_rounding = -1

    Colors matching wofi/mako
    outer_color = rgba(0, 0, 0, 0x1F)
    inner_color = rgba(246, 246, 246, 0xEB)
    font_color = rgba(29, 29, 31, 1.0)

    Active (focused) — Apple blue ring
    check_color = rgba(0, 122, 255, 0.92)
    fail_color = rgba(255, 59, 48, 0.85)

    fade_on_empty = false
    # fade_timeout = 1000
    # placeholder_text = <span foreground="##AEAEB2">Enter Password</span>
    placeholder_text = Enter Password
    hide_input = false
    rounding = 8

    position = 0, -60
    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.10)
    shadow_boost = 1.2
}

# --- Fail message ---
label {
    monitor =
    text = $FAIL
    color = rgba(255, 59, 48, 0.90)
    font_size = 12
    # font_family = SF Pro Text, Helvetica Neue, sans-serif
    position = 0, -112
    halign = center
    valign = center
}

# --- User / hostname ---
label {
    monitor =
    text = $USER
    color = rgba(29, 29, 31, 0.55)
    font_size = 13
    # font_family = SF Pro Text, Helvetica Neue, sans-serif
    position = 0, -15
    halign = center
    valign = center
}
